name: Update RSS Feed

on:
  schedule:
    - cron: '0 * * * *' # 每小时自动运行一次
  workflow_dispatch: # 允许你手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行抓取脚本
        run: python main.py

      - name: 部署到 GitHub Pages (发布 RSS 链接)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 部署当前文件夹下的 feed.xml
          branch: gh-pages # 部署到这个分支
